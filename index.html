<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鍵鼠競品study</title>
<style>
  :root{
    --bg:#0f1216; --panel:#171c23; --panel2:#1e242d; --line:#2a323d;
    --txt:#e7ecf2; --muted:#94a3b8; --accent:#3b82f6; --accent2:#22c55e;
    --warn-bg:#3a300f; --warn-line:#a98a22; --warn-txt:#fde68a;
    --bar:#3b82f6; --radius:12px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,"Segoe UI",Roboto,"Microsoft JhengHei","PingFang TC",sans-serif;
    line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1100px;margin:0 auto;padding:20px 16px 60px}
  header h1{font-size:22px;margin:0 0 4px}
  .sub{color:var(--muted);font-size:13px}
  .banner{margin:14px 0;padding:10px 14px;border-radius:10px;font-size:13.5px;
    background:var(--warn-bg);border:1px solid var(--warn-line);color:var(--warn-txt)}
  .banner.info{background:#0d2a3a;border-color:#1d5b7a;color:#bae6fd}
  .banner.hidden{display:none}
  /* KPI */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px}
  .kpi .v{font-size:20px;font-weight:700}
  .kpi .l{font-size:12px;color:var(--muted);margin-top:2px}
  /* controls */
  .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:8px 0 18px}
  .seg{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .seg button{background:none;border:0;color:var(--muted);padding:8px 14px;font-size:13.5px;cursor:pointer}
  .seg button.active{background:var(--accent);color:#fff;font-weight:600}
  .spacer{flex:1}
  select{background:var(--panel);color:var(--txt);border:1px solid var(--line);
    border-radius:8px;padding:7px 10px;font-size:13px}
  label.sortlbl{color:var(--muted);font-size:12.5px;margin-right:-4px}
  /* 品牌篩選 */
  .brandbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:0 0 18px}
  .brandbar .lbl{color:var(--muted);font-size:12.5px;margin-right:2px}
  .chip{background:var(--panel);border:1px solid var(--line);color:var(--muted);
    padding:5px 13px;border-radius:999px;font-size:12.5px;cursor:pointer;line-height:1.4}
  .chip:hover{border-color:var(--accent)}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  /* cards */
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;display:flex;flex-direction:column;gap:8px}
  .thumb{height:120px;border-radius:8px;background:var(--panel2);display:flex;align-items:center;
    justify-content:center;color:#46505d;font-size:32px;overflow:hidden}
  .thumb img{max-width:100%;max-height:100%;object-fit:contain}
  .brand{font-size:12px;color:var(--muted)}
  .model{font-size:16px;font-weight:700;margin-top:-2px}
  .price{font-size:20px;font-weight:800;color:var(--accent2)}
  .price .cur{font-size:12px;color:var(--muted);font-weight:600;margin-right:2px}
  .price.none{color:var(--muted);font-size:14px;font-weight:600}
  .meta{font-size:12.5px;color:var(--muted)}
  .meta b{color:var(--txt);font-weight:600}
  .specs{font-size:12.5px;color:#cbd5e1;border-top:1px solid var(--line);padding-top:8px}
  .specs .specline{display:flex;gap:8px;margin:3px 0}
  .specs .sk{color:var(--muted);flex:0 0 68px}
  .specs .sv{color:#cbd5e1;flex:1}
  .sell{font-size:12.5px;color:#fcd34d}
  .card a.src{font-size:12px;color:var(--accent);text-decoration:none;margin-top:auto}
  /* table */
  .tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius)}
  table{border-collapse:collapse;width:100%;font-size:13px}
  th,td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
  thead th{background:var(--panel2);color:var(--muted);font-weight:600;position:sticky;top:0;z-index:1;text-align:center}
  .col-brand{display:block;font-size:11px;font-weight:400;color:var(--muted)}
  .col-model{display:block;font-weight:700;color:var(--txt)}
  .col-price{display:block;font-size:12px;margin-top:2px}
  .row-label{background:var(--panel2);color:var(--muted);font-weight:600;
    position:sticky;left:0;z-index:1;border-right:1px solid var(--line);min-width:90px}
  .spec-corner{position:sticky;left:0;top:0;z-index:2;background:var(--panel2);border-right:1px solid var(--line)}
  tbody tr:last-child td,tbody tr:last-child th{border-bottom:0}
  tbody td{text-align:center;color:#cbd5e1}
  .num{text-align:right;font-variant-numeric:tabular-nums}
  .pill{color:var(--accent2);font-weight:700}
  .pill.none{color:var(--muted);font-weight:500}
  /* chart */
  .chart{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
  .row{display:grid;grid-template-columns:170px 1fr 70px;align-items:center;gap:10px;margin:9px 0}
  .row .name{font-size:12.5px;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .track{background:var(--panel2);border-radius:6px;height:22px;overflow:hidden}
  .fill{height:100%;background:linear-gradient(90deg,#2563eb,#3b82f6);border-radius:6px;min-width:2px;
    transition:width .4s ease}
  .row .val{font-size:12.5px;text-align:right;font-variant-numeric:tabular-nums;color:var(--accent2);font-weight:700}
  .row .val.none{color:var(--muted);font-weight:500}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:30px}
  footer{margin-top:30px;color:var(--muted);font-size:12px;text-align:center}
  @media(max-width:640px){
    .kpis{grid-template-columns:repeat(2,1fr)}
    .row{grid-template-columns:110px 1fr 60px}
    header h1{font-size:19px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>鍵鼠競品study</h1>
    <div class="sub" id="sub">載入中…</div>
  </header>

  <div class="banner hidden" id="banner"></div>

  <div class="kpis" id="kpis"></div>

  <div class="controls">
    <div class="seg" id="catSeg"></div>
    <div class="spacer"></div>
    <label class="sortlbl">排序</label>
    <select id="sortSel">
      <option value="default">預設</option>
      <option value="price-asc">價格 低→高</option>
      <option value="price-desc">價格 高→低</option>
      <option value="weight-asc">重量 輕→重</option>
      <option value="brand">品牌</option>
    </select>
    <div class="seg" id="viewSeg">
      <button data-view="cards" class="active">卡片</button>
      <button data-view="table">對照表</button>
      <button data-view="chart">價格圖</button>
      <button data-view="scatter">散點圖</button>
    </div>
  </div>

  <div class="brandbar" id="brandbar"></div>

  <div id="content"></div>

  <footer>
    資料為人工策展整理(規格/圖取自品牌官網或電商)· 價格為人工維護 ·
    <span id="foot-updated"></span>
  </footer>
</div>

<script>
// ---- 讀不到 data.json 時的內建範例後備(例如用 file:// 直接開會被 CORS 擋)----
const FALLBACK = {
  updated_at: "範例資料", currency: "CNY", draft: true, _fallback: true,
  categories: {
    mouse: { label: "辦公滑鼠", spec_fields:["连接方式","分辨率DPI","传感器","手感","滚轮","颜色"], items: [
      { brand:"雷柏 Rapoo", model:"MT760", price:null, size:"125×81×47 mm", weight:"约101g",
        specs_detail:{"连接方式":"蓝牙5.0 / 无线2.4G / 有线","分辨率DPI":"4000DPI","传感器":"原相3220","手感":"右手人体工学","滚轮":"双向","颜色":"黑/粉/灰"}, sell:"", image:"", source_url:"" },
      { brand:"羅技 Logitech", model:"MX Master 3S", price:749, size:"124.9×84.3×51 mm", weight:"141 g",
        specs_detail:{"连接方式":"蓝牙 + Bolt 双模","分辨率DPI":"8000DPI","传感器":"任意表面","手感":"右手人体工学","滚轮":"MagSpeed","颜色":"石墨黑"}, sell:"", image:"", source_url:"" }
    ]},
    kb: { label: "辦公鍵盤", spec_fields:["连接方式","按键数","按键类型","按键行程","按键寿命","供电续航"], items: [
      { brand:"雷柏 Rapoo", model:"E9000G", price:null, size:"284×119×20 mm", weight:"约240g",
        specs_detail:{"连接方式":"多模式无线","按键数":"78键","按键类型":"刀锋","按键行程":"1.5mm","按键寿命":"500万次","供电续航":"2节AAA电池"}, sell:"", image:"", source_url:"" }
    ]}
  }
};

let DATA = null, curCat = null, curView = "cards", curSort = "default";
let curBrands = new Set();   // 空 = 全部品牌

const $ = s => document.querySelector(s);
const fmtPrice = (p, cur) => (p===null||p===""||p===0)
  ? '<span class="price none">價格待填</span>'
  : `<span class="price"><span class="cur">${cur}</span>${Number(p).toLocaleString()}</span>`;

async function boot(){
  try{
    const res = await fetch('./data.json', {cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    DATA = await res.json();
  }catch(e){
    DATA = FALLBACK;
    showBanner('讀不到 data.json('+e.message+'),目前顯示內建範例。請用 http 伺服器開啟(例如 <code>python -m http.server</code>),或部署到 GitHub Pages。', 'info');
  }
  if(DATA.draft && !DATA._fallback){
    showBanner('⚠ 此為草稿資料(draft):部分品項價格尚未填寫或規格未核實,數字僅供參考。', 'warn');
  }
  curCat = Object.keys(DATA.categories)[0];
  $('#sub').textContent = `更新日期 ${DATA.updated_at} · 幣別 ${DATA.currency}`;
  $('#foot-updated').textContent = `更新於 ${DATA.updated_at}`;
  buildCatSeg(); bindControls(); buildBrandFilter(); render();
}

function showBanner(html, type){
  const b = $('#banner'); b.className = 'banner '+(type==='warn'?'':'info');
  b.innerHTML = html;
}

function buildCatSeg(){
  const seg = $('#catSeg'); seg.innerHTML='';
  Object.entries(DATA.categories).forEach(([k,c],i)=>{
    const btn=document.createElement('button');
    btn.textContent=c.label; btn.dataset.cat=k;
    if(k===curCat) btn.classList.add('active');
    btn.onclick=()=>{curCat=k; curBrands.clear();
      [...seg.children].forEach(x=>x.classList.toggle('active',x.dataset.cat===k));
      buildBrandFilter(); render();};
    seg.appendChild(btn);
  });
}

function buildBrandFilter(){
  const bar=$('#brandbar'); bar.innerHTML='';
  const brands=[...new Set(DATA.categories[curCat].items.map(i=>i.brand))];
  const lbl=document.createElement('span'); lbl.className='lbl'; lbl.textContent='品牌'; bar.appendChild(lbl);
  const mk=(text,active,on)=>{const c=document.createElement('span');c.className='chip'+(active?' on':'');c.textContent=text;c.onclick=on;return c;};
  // 全部
  bar.appendChild(mk('全部', curBrands.size===0, ()=>{curBrands.clear(); buildBrandFilter(); render();}));
  brands.forEach(b=>{
    bar.appendChild(mk(b, curBrands.has(b), ()=>{
      curBrands.has(b)?curBrands.delete(b):curBrands.add(b);
      buildBrandFilter(); render();
    }));
  });
}
function bindControls(){
  $('#viewSeg').querySelectorAll('button').forEach(b=>{
    b.onclick=()=>{curView=b.dataset.view;
      $('#viewSeg').querySelectorAll('button').forEach(x=>x.classList.toggle('active',x===b)); render();};
  });
  $('#sortSel').onchange=e=>{curSort=e.target.value; render();};
}

function parseWeight(w){ const m=String(w).match(/([\d.]+)\s*g/); return m?parseFloat(m[1]):Infinity; }
function sortItems(items){
  const a=[...items];
  const p=x=>(x.price===null||x.price===''||x.price===0)?Infinity:Number(x.price);
  switch(curSort){
    case 'price-asc': return a.sort((x,y)=>p(x)-p(y));
    case 'price-desc': return a.sort((x,y)=>{const d=p(y)-p(x);return isFinite(d)?d:(p(x)===Infinity?1:-1);});
    case 'weight-asc': return a.sort((x,y)=>parseWeight(x.weight)-parseWeight(y.weight));
    case 'brand': return a.sort((x,y)=>String(x.brand).localeCompare(String(y.brand),'zh-Hant'));
    default: return a;
  }
}

function computeKPI(items){
  const prices=items.map(i=>i.price).filter(p=>!(p===null||p===''||p===0)).map(Number);
  const have=prices.length, miss=items.length-have;
  const min=have?Math.min(...prices):null, max=have?Math.max(...prices):null;
  const avg=have?Math.round(prices.reduce((a,b)=>a+b,0)/have):null;
  return {count:items.length, have, miss, min, max, avg};
}
function renderKPI(items, cur){
  const k=computeKPI(items);
  const cell=(v,l)=>`<div class="kpi"><div class="v">${v}</div><div class="l">${l}</div></div>`;
  $('#kpis').innerHTML =
    cell(k.count,'品項數') +
    cell(k.min!==null?`${cur} ${k.min.toLocaleString()}`:'—','最低價') +
    cell(k.avg!==null?`${cur} ${k.avg.toLocaleString()}`:'—','平均價') +
    cell(k.miss?`${k.miss} 項`:'0',k.miss?'待填價格':'價格齊全');
}

function render(){
  const cat=DATA.categories[curCat];
  let items=cat.items;
  if(curBrands.size) items=items.filter(i=>curBrands.has(i.brand));
  items=sortItems(items);
  renderKPI(items, DATA.currency);
  const c=$('#content');
  if(!items.length){ c.innerHTML='<div class="empty">沒有符合篩選的品項。</div>'; return; }
  const fields=cat.spec_fields||[];
  if(curView==='cards') c.innerHTML=viewCards(items, DATA.currency, fields);
  else if(curView==='table') c.innerHTML=viewTable(items, DATA.currency, fields);
  else if(curView==='scatter') c.innerHTML=viewScatter(items, DATA.currency, curCat);
  else c.innerHTML=viewChart(items, DATA.currency);
}

function specLines(sd, fields){
  const keys=(fields&&fields.length)?fields:Object.keys(sd||{});
  return keys.filter(f=>sd&&sd[f]&&sd[f]!=='—')
    .map(f=>`<div class="specline"><span class="sk">${f}</span><span class="sv">${sd[f]}</span></div>`).join('');
}

function viewCards(items, cur, fields){
  return '<div class="cards">'+items.map(i=>{
    const detail=specLines(i.specs_detail, fields);
    return `
    <div class="card">
      <div class="thumb">${i.image?`<img src="${i.image}" alt="">`:'🖱️'}</div>
      <div>
        <div class="brand">${i.brand||''}</div>
        <div class="model">${i.model||''}</div>
      </div>
      ${fmtPrice(i.price, cur)}
      <div class="meta"><b>尺寸</b> ${i.size||'—'} &nbsp;·&nbsp; <b>重量</b> ${i.weight||'—'}</div>
      ${detail?`<div class="specs">${detail}</div>`:''}
      ${i.sell?`<div class="sell">${i.sell}</div>`:''}
      ${i.source_url?`<a class="src" href="${i.source_url}" target="_blank" rel="noopener">來源頁 ↗</a>`:''}
    </div>`;}).join('')+'</div>';
}

function viewTable(items, cur, fields){
  fields=fields||[];
  // 欄標頭：每個品項一欄
  const colHeaders=items.map(i=>{
    const hasPrice=!(i.price===null||i.price===''||i.price===0);
    const priceHtml=hasPrice
      ?`<span class="pill col-price">${cur} ${Number(i.price).toLocaleString()}</span>`
      :`<span class="pill none col-price">待填</span>`;
    return `<th><span class="col-brand">${i.brand||''}</span><span class="col-model">${i.model||''}</span>${priceHtml}</th>`;
  }).join('');
  // 列定義：[列名, 取值函式]
  const rowDefs=[
    ['尺寸',   i=>i.size||'—'],
    ['重量',   i=>i.weight||'—'],
    ...fields.map(f=>[f, i=>(i.specs_detail||{})[f]||'—'])
  ];
  const bodyRows=rowDefs.map(([label,getter])=>{
    const cells=items.map(i=>`<td>${getter(i)}</td>`).join('');
    return `<tr><th class="row-label">${label}</th>${cells}</tr>`;
  }).join('');
  return `<div class="tablewrap"><table>
    <thead><tr><th class="spec-corner"></th>${colHeaders}</tr></thead>
    <tbody>${bodyRows}</tbody>
  </table></div>`;
}

function viewChart(items, cur){
  const priced=items.filter(i=>!(i.price===null||i.price===''||i.price===0));
  if(!priced.length){
    return `<div class="chart"><div class="empty">尚無任何價格資料。<br>價格為人工維護,請在 <code>data.json</code> 填入各品項的 <code>price</code>(純數字)。</div></div>`;
  }
  const max=Math.max(...priced.map(i=>Number(i.price)));
  // 有價格者畫長條,無價格者列在後面標「待填」
  const drawn=sortItems(items);
  const rows=drawn.map(i=>{
    const has=!(i.price===null||i.price===''||i.price===0);
    const w=has?Math.max(2,Number(i.price)/max*100):0;
    return `<div class="row">
      <div class="name" title="${i.brand} ${i.model}">${i.model}</div>
      <div class="track">${has?`<div class="fill" style="width:${w}%"></div>`:''}</div>
      <div class="val ${has?'':'none'}">${has?cur+' '+Number(i.price).toLocaleString():'待填'}</div>
    </div>`;
  }).join('');
  return `<div class="chart">${rows}</div>`;
}

function viewScatter(items, cur, catKey){
  function parseDPImax(s){
    const n=(String(s).match(/\d+/g)||[]).map(Number);
    return n.length?Math.max(...n):null;
  }
  function parseBattery(s){
    const m=String(s).match(/(\d{3,5})\s*mAh/i);
    return m?parseInt(m[1]):null;
  }
  const pal=['#3b82f6','#22c55e','#f59e0b','#ef4444','#a855f7','#06b6d4','#ec4899'];
  const brandClr={};
  [...new Set(items.map(i=>i.brand))].forEach((b,i)=>brandClr[b]=pal[i%pal.length]);

  const HAND_CLR={'小手型':'#f59e0b','中手型':'#3b82f6','大手型':'#22c55e'};
  const isMouse=catKey==='mouse';
  const xLabel=isMouse?'最大 DPI':'電池容量 (mAh)';
  const xGetter=isMouse
    ?i=>parseDPImax((i.specs_detail||{})['分辨率DPI'])
    :i=>parseBattery((i.specs_detail||{})['供电续航']);
  const xFmt=isMouse?(v=>v>=1000?(v/1000)+'k':String(v)):(v=>v+'');
  const ptClr=isMouse
    ?(p=>HAND_CLR[(p.specs_detail||{})['手型']]||'#94a3b8')
    :(p=>brandClr[p.brand]||'#94a3b8');

  const allPts=items.map(i=>({x:xGetter(i),y:(i.price!==null&&i.price!==''&&i.price!==0)?Number(i.price):null,model:i.model,brand:i.brand,specs_detail:i.specs_detail||{}}));
  const skipped=allPts.filter(p=>p.x===null||p.y===null).map(p=>p.model);
  let pts=allPts.filter(p=>p.x!==null&&p.y!==null);
  if(pts.length<2) return `<div class="chart"><div class="empty">散點圖資料不足(需至少 2 項有完整資料)。<br>缺少: ${skipped.join('、')}</div></div>`;

  // Jitter 同 X 值的點,避免重疊
  const xGrp={};
  pts.forEach(p=>{xGrp[p.x]=(xGrp[p.x]||[]);xGrp[p.x].push(p);});
  const xs=pts.map(p=>p.x), ys=pts.map(p=>p.y);
  const xSpan=Math.max(...xs)-Math.min(...xs)||1;
  Object.values(xGrp).forEach(grp=>{
    if(grp.length<2) return;
    const step=xSpan*0.06;
    grp.forEach((p,i)=>p.xj=p.x+(i-(grp.length-1)/2)*step);
  });
  pts.forEach(p=>{ if(p.xj===undefined) p.xj=p.x; });

  const W=680,H=400,ML=68,MR=20,MT=24,MB=72;
  const pw=W-ML-MR, ph=H-MT-MB;
  const xVals=pts.map(p=>p.xj);
  const xSpanJ=Math.max(...xVals)-Math.min(...xVals)||1;
  const ySpan=Math.max(...ys)-Math.min(...ys)||1;
  const xMin2=Math.min(...xVals)-xSpanJ*0.16, xMax2=Math.max(...xVals)+xSpanJ*0.16;
  const yMin2=Math.min(...ys)-ySpan*0.22, yMax2=Math.max(...ys)+ySpan*0.22;
  const sx=x=>ML+(x-xMin2)/(xMax2-xMin2)*pw;
  const sy=y=>MT+ph-(y-yMin2)/(yMax2-yMin2)*ph;

  function niceTicks(lo,hi,max=6){
    const sp=hi-lo, st=Math.pow(10,Math.floor(Math.log10(sp)));
    const nice=[1,2,5].map(m=>m*st).find(s=>sp/s<=max)||st*10;
    const t=[];
    for(let v=Math.ceil(lo/nice)*nice;v<=hi+nice*0.01;v+=nice) t.push(Math.round(v*1000)/1000);
    return t;
  }
  const yTicks=niceTicks(yMin2,yMax2);
  const xTicks=niceTicks(xMin2,xMax2);
  const vxMin=Math.min(...xs), vxMax=Math.max(...xs);

  const grid=yTicks.map(t=>`<line x1="${ML}" y1="${sy(t).toFixed(1)}" x2="${ML+pw}" y2="${sy(t).toFixed(1)}" stroke="#1e242d" stroke-width="1.5"/>`).join('');
  const yLbl=yTicks.map(t=>`<text x="${ML-7}" y="${(sy(t)+4).toFixed(1)}" text-anchor="end" fill="#64748b" font-size="11">${t>=1000?t.toLocaleString():t}</text>`).join('');
  const xLbl=xTicks.filter(t=>t>=vxMin-xSpan*0.05&&t<=vxMax+xSpan*0.05)
    .map(t=>`<text x="${sx(t).toFixed(1)}" y="${(MT+ph+16).toFixed(1)}" text-anchor="middle" fill="#64748b" font-size="11">${xFmt(t)}</text>`).join('');

  // 點與標籤
  const circles=pts.map((p,idx)=>{
    const cx=sx(p.xj), cy=sy(p.y), clr=ptClr(p);
    const grpLen=(xGrp[p.x]||[]).length;
    const lbl=p.model.length>12?p.model.slice(0,11)+'…':p.model;
    // 同 cluster 的標籤交替上下
    const grpIdx=(xGrp[p.x]||[]).indexOf(p);
    const lblAbove=(cy>MT+ph*0.55)||(grpLen>1&&grpIdx%2===1);
    const ly=lblAbove?cy-13:cy+18;
    const tip=`${p.brand} ${p.model}&#10;${xLabel}: ${xFmt(p.x)}&#10;價格: ${cur} ${p.y.toLocaleString()}`;
    return `<g><circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="8" fill="${clr}" fill-opacity="0.85" stroke="#fff" stroke-width="1.5" stroke-opacity="0.5"/><text x="${cx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="middle" fill="#e2e8f0" font-size="11.5" font-weight="600">${lbl}</text><title>${tip}</title></g>`;
  }).join('');

  // 圖例
  let legendItems=isMouse
    ?Object.entries(HAND_CLR).filter(([k])=>pts.some(p=>(p.specs_detail['手型']||'')=== k))
    :[...new Set(pts.map(p=>p.brand))].map(b=>[b,brandClr[b]]);
  const legSvg=legendItems.map(([lbl,clr],i)=>`<g transform="translate(${ML+i*145},${MT+ph+46})"><circle r="5" fill="${clr}"/><text x="10" y="4" fill="#94a3b8" font-size="11.5">${lbl}</text></g>`).join('');
  const note=skipped.length?`<div style="color:#64748b;font-size:11.5px;text-align:center;margin-top:4px">＊ ${skipped.join('、')} 缺 ${xLabel} 資料,未列入</div>`:'';

  return `<div class="chart" style="padding:12px 0 4px;overflow:hidden">
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;font-family:inherit">
      <rect x="${ML}" y="${MT}" width="${pw}" height="${ph}" fill="#171c23" rx="4"/>
      ${grid}
      <line x1="${ML}" y1="${MT}" x2="${ML}" y2="${MT+ph}" stroke="#2a323d" stroke-width="1.5"/>
      <line x1="${ML}" y1="${MT+ph}" x2="${ML+pw}" y2="${MT+ph}" stroke="#2a323d" stroke-width="1.5"/>
      ${yLbl}${xLbl}
      <text transform="rotate(-90)" x="${-(MT+ph/2)}" y="16" text-anchor="middle" fill="#64748b" font-size="12">價格 (${cur})</text>
      <text x="${ML+pw/2}" y="${(MT+ph+33).toFixed(1)}" text-anchor="middle" fill="#64748b" font-size="12">${xLabel}</text>
      ${circles}${legSvg}
    </svg>${note}
  </div>`;
}

boot();
</script>
</body>
</html>
