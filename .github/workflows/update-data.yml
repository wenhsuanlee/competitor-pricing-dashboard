name: update-data

on:
  schedule:
    - cron: "0 1 * * *"   # 01:00 UTC = 台灣 09:00
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/scrape.py

      - name: Commit updated data.json (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data.json; then
            echo "data.json 無變動,跳過提交。"
          else
            git add data.json
            git commit -m "chore(data): auto-update specs $(date -u +%Y-%m-%d)"
            git push
          fi
